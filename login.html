<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nest Grocery Stores - Sign In</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&family=Quicksand:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="img/logo-icon.svg">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 25px;">
                <div class="logo-icon">
                    <img src="img/logo-icon.svg" alt="Nest Logo">
                </div>
                Nest<span>Grocery</span>
            </a>
            <h1>Welcome Back</h1>
            <p>Login to your account to continue shopping.</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" style="font-size: 0.8rem; color: var(--primary-pink); font-weight: 500;">Forgot
                        Password?</a>
                </div>
            </div>

            <button type="submit" class="btn btn-pink auth-btn">Login Now</button>

            <div style="display: flex; align-items: center; gap: 15px; margin: 25px 0;">
                <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
                <span style="font-size: 0.8rem; color: var(--text-muted);">OR LOGIN WITH</span>
                <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
            </div>

            <div style="display: flex; gap: 15px;">
                <button type="button" class="btn btn-outline"
                    style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.85rem;"><i
                        class="fab fa-google" style="color: #ea4335;"></i> Google</button>
                <button type="button" class="btn btn-outline"
                    style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.85rem;"><i
                        class="fab fa-facebook-f" style="color: #1877f2;"></i> Facebook</button>
            </div>
        </form>

        <div class="auth-footer">
            <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>

</html>
