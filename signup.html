<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Nest Grocery Stores - Create Account</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&family=Quicksand:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="img/logo-icon.svg">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

    <div class="auth-card" style="max-width: 500px; padding: 40px;">
        <div class="auth-header">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 20px;">
                <div class="logo-icon">
                    <img src="img/logo-icon.svg" alt="Nest Logo">
                </div>
                Nest<span>Grocery</span>
            </a>
            <h1>Create Account</h1>
            <p>Join the community for premium organic shopping.</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="+1 (234) 567-890" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Repeat password" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px; align-items: start; text-align: left; margin-bottom: 25px;">
                <input type="checkbox" style="width: auto; margin-top: 5px;" required>
                <p style="font-size: 0.8rem; color: var(--text-muted);">I agree to the <a href="#"
                        style="color: var(--primary-pink); font-weight: 500;">Terms & Conditions</a> and <a href="#"
                        style="color: var(--primary-pink); font-weight: 500;">Privacy Policy</a>.</p>
            </div>

            <button type="submit" class="btn btn-pink auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>

</html>
